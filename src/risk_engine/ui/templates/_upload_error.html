<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Upload problem</title>
  <style>
    body { font: 15px/1.5 system-ui, sans-serif; margin: 0; color: #1a1a1a; }
    header { padding: 1rem 1.5rem; background: #102a43; color: #fff; }
    header h1 { margin: 0; font-size: 1.2rem; }
    main { padding: 1.5rem; max-width: 640px; }
    .msg { border: 1px solid #f0c0c0; background: #fdf3f3; border-radius: 8px;
      padding: 1rem 1.2rem; color: #7a1414; }
    a.back { display: inline-block; margin-top: 1rem; color: #1d4e79; font-weight: 600;
      text-decoration: none; }
    a.back:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header><h1>Intake Flagging &mdash; upload problem</h1></header>
  <main>
    <p class="msg">{{ message }}</p>
    <a class="back" href="/">&larr; Back to intake</a>
  </main>
</body>
</html>
